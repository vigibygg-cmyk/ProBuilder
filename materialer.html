<style>
:root {
  --bg:           #f7f9fa;
  --card:         #ffffff;
  --surface2:     #f0f4f8;
  --text:         #1a202c;
  --muted:        #718096;
  --dim:          #a0aec0;
  --primary:      #2b6cb0;
  --primary-dark: #1a4a8a;
  --primary-glow: rgba(43,108,176,0.12);
  --border-focus: #2b6cb0;
  --accent:       #dd6b20;
  --accent-dark:  #b7521a;
  --success:      #276749;
  --success-bg:   #f0fff4;
  --warn:         #744210;
  --warn-bg:      #fffbeb;
  --danger:       #c53030;
  --danger-bg:    #fff5f5;
  --border:       #e2e8f0;
  --radius:       10px;
  --radius-sm:    7px;
  --shadow:       0 2px 8px rgba(0,0,0,0.07);
  --shadow-md:    0 4px 16px rgba(0,0,0,0.10);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

body {
  font-family: 'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif;
  background-color: var(--bg);
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size: 40px 40px;
  background-attachment: fixed;
  color: var(--text);
  min-height: 100vh;
  font-size: 15px;
}

/* ─── HEADER ─── */
header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: #ffffff;
  border-bottom: 1px solid var(--border);
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  padding: 0 20px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.header-left { display: flex; align-items: center; gap: 10px; }
.back-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--muted);
  font-size: 0.8rem;
  font-weight: 600;
  text-decoration: none;
  transition: all 0.18s;
  white-space: nowrap;
  min-height: 36px;
}
.back-btn:hover {
  color: var(--primary);
  border-color: var(--primary);
  background: #e8f0fe;
}
.page-title { font-size: 0.95rem; font-weight: 700; letter-spacing: -0.02em; white-space: nowrap; color: var(--text); }
.page-title span { color: var(--primary); }

.lang-group {
  display: flex;
  align-items: center;
  gap: 2px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 3px;
}
.lang-btn {
  padding: 4px 10px;
  border-radius: 16px;
  border: none;
  background: transparent;
  color: var(--muted);
  font-size: 0.74rem;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.18s;
}
.lang-btn:hover { color: var(--text); }
.lang-btn.active {
  background: var(--primary);
  color: #ffffff;
}

/* ─── TABS ─── */
.tab-nav {
  display: flex;
  gap: 6px;
  padding: 12px 16px 0;
  overflow-x: auto;
  scrollbar-width: none;
  max-width: 1020px;
  margin: 0 auto;
  -webkit-overflow-scrolling: touch;
}
.tab-nav::-webkit-scrollbar { display: none; }
.tab-btn {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 10px 18px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--muted);
  font-size: 0.86rem;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.18s;
  min-height: 44px;
}
.tab-btn:hover {
  color: var(--text);
  border-color: #a0aec0;
  background: var(--surface2);
}
.tab-btn.active {
  background: #ebf8ff;
  border-color: var(--primary);
  color: var(--primary);
}

/* ─── MAIN ─── */
main {
  position: relative; z-index: 1;
  max-width: 1020px; margin: 0 auto;
  padding: 16px 16px 60px;
  display: flex; flex-direction: column; gap: 16px;
}
.tab-panel { display: flex; flex-direction: column; gap: 16px; }

/* ─── CARDS ─── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 18px 20px;
}
.card-title, .ct {
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 7px;
}
.card-title::after, .ct::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ─── FORM ─── */
.form-grid, .fg {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
  gap: 12px;
}
.field, .f { display: flex; flex-direction: column; gap: 5px; }
label {
  font-size: 0.73rem;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
input[type="number"], input[type="text"], input[type="date"], select, textarea {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  color: var(--text);
  font-family: inherit;
  font-size: 16px;
  outline: none;
  transition: border-color 0.18s, box-shadow 0.18s;
  width: 100%;
  min-height: 44px;
}
input:focus, select:focus, textarea:focus {
  border-color: var(--border-focus);
  box-shadow: 0 0 0 3px var(--primary-glow);
  background: #ffffff;
}
input::placeholder { color: var(--dim); }
.hint { font-size: 0.69rem; color: var(--dim); line-height: 1.4; }

/* ─── DYNAMIC ROWS ─── */
.dy { display: grid; gap: 8px; align-items: end; margin-bottom: 8px; }
.dy2 { grid-template-columns: 2fr 1fr auto; }
.dy3 { grid-template-columns: 2fr 1fr 1fr auto; }
.dy4 { grid-template-columns: 2fr 1fr 1fr 1fr auto; }
.dy5 { grid-template-columns: 2fr 1fr 1fr 1fr 1fr auto; }

.xb {
  width: 40px; height: 40px; border-radius: 6px;
  border: 1px solid rgba(197, 48, 48, 0.3);
  background: transparent; color: var(--danger);
  cursor: pointer; font-size: 1.1rem;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.18s; align-self: flex-end;
}
.xb:hover { background: var(--danger-bg); border-color: var(--danger); }

/* ─── RESULT BOXES ─── */
.result-grid, .rg {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 10px;
  margin-bottom: 16px;
}
.rb {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px;
  text-align: center;
}
.rb.hi { border-color: var(--primary); background: #ebf8ff; }
.rv {
  font-family: 'Consolas', monospace;
  font-size: 1.35rem;
  font-weight: 600;
  color: var(--text);
  line-height: 1;
}
.rv.ok { color: var(--success); }
.rv.inf { color: var(--primary); }
.rv.wa { color: var(--warn); }
.rv.ac { color: var(--accent); }
.rl {
  font-size: 0.67rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-top: 4px;
}

/* ─── INFO BOXES ─── */
.ib { padding: 11px 14px; border-radius: var(--radius-sm); font-size: 0.83rem; line-height: 1.6; margin-bottom: 10px; }
.ib.bl { background: #ebf8ff; border: 1px solid #bee3f8; color: #2b6cb0; }
.ib.gr { background: var(--success-bg); border: 1px solid #9ae6b4; color: var(--success); }
.ib.ye { background: var(--warn-bg); border: 1px solid #fbd38d; color: var(--warn); }

.sl { font-size: 0.71rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.09em; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
.sl::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* ─── TOGGLES ─── */
.tg-row { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
.tg {
  padding: 8px 16px; border-radius: var(--radius-sm); border: 1px solid var(--border);
  background: var(--surface2); color: var(--muted); font-size: 0.82rem; font-weight: 600;
  cursor: pointer; transition: all 0.18s; min-height: 40px;
}
.tg:hover { border-color: var(--dim); }
.tg.active { background: var(--primary); color: #ffffff; border-color: var(--primary); }

/* ─── TABLE ─── */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 0.84rem; }
thead th {
  padding: 9px 12px;
  background: var(--surface2);
  border-bottom: 2px solid var(--border);
  font-size: 0.68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.09em;
  color: var(--muted);
  text-align: left;
}
tbody tr { border-bottom: 1px solid var(--border); }
tbody tr:nth-child(even) { background: #fbfbfc; }
tbody tr:hover { background: #ebf8ff; }
tbody td { padding: 9px 12px; font-size: 0.85rem; vertical-align: middle; }
td.tl { font-weight: 600; color: var(--text); }
td.tv { font-family: 'Consolas', monospace; color: var(--primary); font-weight: 600; }
td.tm { color: var(--muted); }
td.ta { font-family: 'Consolas', monospace; color: var(--accent); }

/* ─── BUTTONS ─── */
.btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 10px 18px; border-radius: var(--radius-sm);
  border: 1px solid transparent; font-family: inherit;
  font-size: 0.84rem; font-weight: 600;
  cursor: pointer; transition: all 0.18s; min-height: 44px; white-space: nowrap;
}
.btn-primary, .bp { background: var(--primary); color: #ffffff; box-shadow: 0 2px 8px rgba(43,108,176,0.25); }
.btn-primary:hover, .bp:hover { background: var(--primary-dark); }
.btn-outline, .bo { background: transparent; border-color: var(--border); color: var(--muted); }
.btn-outline:hover, .bo:hover { color: var(--text); border-color: #a0aec0; background: var(--surface2); }
.btn-danger-outline, .bd { background: transparent; border-color: rgba(197,48,48,0.3); color: var(--danger); }
.btn-danger-outline:hover, .bd:hover { background: var(--danger-bg); border-color: var(--danger); }
.btn-add, .ba { background: var(--success-bg); border: 1px solid #9ae6b4; color: var(--success); width: 100%; justify-content: center; }
.btn-add:hover, .ba:hover { background: #c6f6d5; }
.btn-row { display: flex; gap: 8px; flex-wrap: wrap; }

/* ─── FOOTER ─── */
.main-footer {
  margin-top: 40px; padding: 20px; border-top: 1px solid var(--border);
  text-align: center; color: var(--dim); font-size: 0.8rem; background: var(--card);
}

/* ─── PRINT ─── */
@media print {
  header, .tab-nav, .no-print { display: none !important; }
  main { padding: 0; max-width: 100%; }
  body { background: #fff; color: #111; font-size: 10pt; }
  .card { background: #fff; border: 1px solid #ccc; box-shadow: none; break-inside: avoid; padding: 12pt; }
  .tab-panel.hidden { display: flex !important; }
  .ph { display: block !important; }
  canvas { display: none !important; }
  footer.main-footer { display: block !important; position: fixed; bottom: 0; width: 100%; border-top: 1px solid #ccc; background: #fff; }
}
.ph { display: none; border-bottom: 2px solid #333; padding-bottom: 10pt; margin-bottom: 14pt; }
.ph h1 { font-size: 16pt; font-weight: 700; }
.ph .pm { font-size: 9pt; color: #555; margin-top: 4pt; }

.hidden { display: none !important; }

/* ─── MOBILE ─── */
@media (max-width: 768px) {
  .btn-row .btn { width: 100%; justify-content: center; }
  .fg { grid-template-columns: 1fr; }
  .rg { grid-template-columns: repeat(2, 1fr); }
  .dy3, .dy4, .dy5 { grid-template-columns: 1fr 1fr; }
}
</style>
</head>

<div class="ph" id="ph"><h1 id="ph-t">ProBuilder — Material Quantities</h1><div class="pm" id="ph-m"></div></div>

<!-- ─── HEADER ─── -->

  <button class="tab-btn" data-tab="t2" onclick="sw('t2',this)">📏 <span data-i="tab2"></span></button>

</div>

<main>

<!-- PROJECT INFO -->
<div class="card no-print">
  <div class="ct"><span data-i="sec_proj"></span></div>
  <div class="fg">
    <div class="f" style="grid-column:span 2;"><label data-i="lbl_pname"></label><input type="text" id="proj_name" data-i-ph="ph_pname" oninput="updPH()"></div>
    <div class="f"><label data-i="lbl_date"></label><input type="date" id="proj_date" oninput="updPH()"></div>
    <div class="f"><label data-i="lbl_addr"></label><input type="text" id="proj_addr" data-i-ph="ph_addr" oninput="updPH()"></div>
  </div>
</div>

<!-- T1: PARQUET -->
<div id="t1" class="tab-panel">
  <div class="card">
    <div class="ct"><span data-i="sec_parquet"></span></div>
    <div class="sl" data-i="sl_board"></div>
    <div class="fg">
      <div class="f"><label data-i="lbl_bl"></label><input type="number" id="par_bl" inputmode="decimal" placeholder="1200" oninput="calcParquet()"><span class="hint">mm</span></div>

      <div class="f"><label data-i="lbl_waste_pct"></label><input type="number" id="par_waste" inputmode="decimal" placeholder="10" oninput="calcParquet()"><span class="hint">%</span></div>

// ════ T1: PARQUET ════
function calcParquet(){
  const bl=gv('par_bl')||1200, bw=gv('par_bw')||138, ppu=gv('par_ppu')||8;
  const m2=gv('par_m2'), waste=gv('par_waste')||10;
  if(!m2){document.getElementById('par-results').innerHTML='';return;}
  const bm2=(bl/1000)*(bw/1000);
  const totM2=m2*(1+waste/100);
  const totPcs=Math.ceil(totM2/bm2);
  const packs=Math.ceil(totPcs/ppu);
  const underlay=m2*1.05;
  document.getElementById('par-results').innerHTML=
    rb(n(m2,2)+' m²','Floor area','mu')+
    rb(n(totM2,2)+' m²',`Parquet incl. ${waste}% waste`,'inf',true)+
    rb(n(totPcs)+' pcs','Total boards','ac')+
    rb(n(packs)+' packs',`Packs (${ppu} pcs)`,'ok')+
    rb(n(underlay,2)+' m²','Underlay (5%)','ac');
  addSum('parquet','Parquet',n(totM2,2),'m²',totM2*8);
  addSum('parquet','Underlay',n(underlay,2),'m²',underlay*0.5);
  drawPat();save();
}

function drawPat(){
  const canvas=document.getElementById('pat-canvas');if(!canvas)return;
  const W=canvas.parentElement.offsetWidth||500;
  canvas.width=W;canvas.height=160;
  const ctx=canvas.getContext('2d');ctx.clearRect(0,0,W,160);
  const sel=document.getElementById('par_pattern');
  const pv=sel?.options[sel.selectedIndex]?.dataset.v||'straight';
  const bl=Math.max(gv('par_bl')||1200,100), bw=Math.max(gv('par_bw')||138,30);
  const sc=Math.min((W-20)/(bl*2.5),150/bw,0.055);
  const BL=bl*sc,BW=bw*sc;
  ctx.strokeStyle='rgba(43,108,176,0.6)';ctx.lineWidth=0.8;

  if(pv==='straight'||pv==='brick'){
    const c1='rgba(43,108,176,0.1)',c2='rgba(43,108,176,0.05)';
    for(let row=0;row<Math.ceil(160/BW)+1;row++){
      const off=(pv==='brick'&&row%2===1)?BL/2:0;
      for(let col=-1;col<Math.ceil(W/BL)+2;col++){
        const x=col*BL+off+10,y=row*BW+4;
        ctx.fillStyle=row%2===0?c1:c2;ctx.fillRect(x,y,BL-1,BW-1);ctx.strokeRect(x,y,BL-1,BW-1);
      }
    }
  } else if(pv==='herring'){
    for(let r=0;r<7;r++){for(let c=0;c<10;c++){
      const cx=c*(BL+BW)+10,cy=r*(BL+BW)+4;
      ctx.fillStyle='rgba(43,108,176,0.08)';ctx.fillRect(cx,cy,BL-1,BW-1);ctx.strokeRect(cx,cy,BL-1,BW-1);
      ctx.fillStyle='rgba(221,107,32,0.06)';ctx.fillRect(cx+BL,cy,BW-1,BL-1);ctx.strokeRect(cx+BL,cy,BW-1,BL-1);
    }}
  } else if(pv==='diagonal'){
    ctx.save();ctx.translate(W/2,80);ctx.rotate(Math.PI/4);
    for(let r=-6;r<10;r++){for(let c=-6;c<18;c++){
      const x=c*BL,y=r*BW;
      ctx.fillStyle=c%2===0?'rgba(39,103,73,0.06)':'rgba(43,108,176,0.08)';
      ctx.fillRect(x,y,BL-1,BW-1);ctx.strokeRect(x,y,BL-1,BW-1);
    }}ctx.restore();
  }
}

function renderRooms(){

function syncCeils(i){const r=rooms[i];ceils.forEach(c=>{if(c.fromRoom===i){c.perim=r.perim;c.label=r.name||c.label;}});renderCeils();}
function addCeil(label='',perim='',fromRoom=null){const id=++cId;ceils.push({id,label,perim,fromRoom});renderCeils();calcTrims();}

      <button class="xb no-print" onclick="removeCeil(${ci.id})">×</button>`;

  });

function calcTrims(){
  const waste=gv('trim_waste')/100||0.10, wf=1+waste;
  let sk=0,dt=0,wt=0;
  rooms.forEach(r=>{
    const p=(r.perim||0)/1000, dc=r.dc||0, dw=(r.dw||0)/1000, dh=(r.dh||0)/1000;
    const wc=r.wc||0, ww=(r.ww||0)/1000, wh=(r.wh||0)/1000;
    sk+=Math.max(0,p-dc*dw);dt+=dc*(2*dh+dw)*2;wt+=wc*(2*wh+2*ww);
  });
  const ct=ceils.reduce((s,c)=>s+(c.perim||0)/1000,0);
  document.getElementById('trim-results').innerHTML=
    rb(n(sk*wf,1)+' lm',`Skirting (+${Math.round(waste*100)}%)`,'inf',true)+
    rb(n(dt*wf,1)+' lm','Door trims','ac')+
    rb(n(wt*wf,1)+' lm','Window trims','ok')+
    rb(n(ct*wf,1)+' lm','Ceiling coving','ac');
  addSum('trims','Skirting',n(sk*wf,1),'lm',sk*wf*1.2);
  addSum('trims','Door/Win trims',n((dt+wt)*wf,1),'lm',(dt+wt)*wf*1.2);
  addSum('trims','Ceiling coving',n(ct*wf,1),'lm',ct*wf*1.2);
  save();
}

function calcTer(){
  const l=gv('ter_l'),w=gv('ter_w'),bw=gv('ter_bw')||145;
  const gap=gv('ter_gap')||4,len=gv('ter_len')||4800,cc=gv('ter_cc')||600,waste=gv('ter_waste')||7;
  if(!l||!w){document.getElementById('ter-res').innerHTML='';return;}
  const area=(l/1000)*(w/1000);
  const lm=area/((bw+gap)/1000)*(1+waste/100);
  const pcs=Math.ceil(lm/(len/1000));
  const joistLm=(Math.ceil((w/1000)/(cc/1000))+1)*(l/1000)*1.05;
  document.getElementById('ter-res').innerHTML=
    rb(n(area,2)+' m²','Area','mu')+
    rb(n(lm,1)+' lm',`Boards lm (+${waste}%)`,'inf',true)+
    rb(n(pcs)+' pcs',`Boards (${len/1000}m)`,'ac')+
    rb(n(joistLm,1)+' lm',`Joists CC${cc}mm`,'ok')+
    rb(n(lm*10,0)+' kg','Est. weight','wa');
  const e=document.getElementById('tsc_lm');if(e&&!e.value)e.value=n(lm,1);
  addSum('terrace','Decking boards',n(lm,1),'lm',lm*10);save();
}
function calcTSC(){
  const lm=gv('tsc_lm'),cc=gv('tsc_cc')||600,per=gi('tsc_per')||2;
  if(!lm){document.getElementById('tsc-res').innerHTML='';return;}
  const total=Math.ceil((lm/(cc/1000))*per*1.05);
  document.getElementById('tsc-res').innerHTML=rb(n(total)+' pcs','Total screws','inf')+rb(n(Math.ceil(total/200))+' boxes','Boxes (200)','ac');
  addSum('terrace','Terrace screws',n(total),'pcs',total*0.008);save();
}

      <div class="f"><label>${t.lbl_op_lbl} ${i+1}</label><input type="text" value="${o.label}" oninput="cops[${i}].label=this.value;save();"></div>
      <div class="f"><label>${t.lbl_op_w}</label><input type="number" value="${o.w}" oninput="cops[${i}].w=parseFloat(this.value)||0;calcClad();save();"></div>
      <div class="f"><label>${t.lbl_op_h}</label><input type="number" value="${o.h}" oninput="cops[${i}].h=parseFloat(this.value)||0;calcClad();save();"></div>
      <button class="xb no-print" onclick="removeCO(${o.id})">×</button>`;
    c.appendChild(div);
  });
}
function calcClad(){
  const bw=gv('clad_bw')||148,cov=gv('clad_cov')||137,ol=gv('clad_ol')||20;
  const bl=gv('clad_bl')||4800,waste=gv('clad_waste')||12;
  const gross=cwalls.reduce((s,w)=>s+(w.area||0),0);
  const opA=cops.reduce((s,o)=>s+((o.w||0)/1000)*((o.h||0)/1000)*(o.cnt||1),0);
  const net=Math.max(0,gross-opA);
  if(net<=0&&gross<=0){document.getElementById('clad-res').innerHTML='';return;}
  const dekk=cladMode==='h'?cov:bw-ol;
  const lm=cladMode==='h'?(net/(dekk/1000))*(1+waste/100):(net/(dekk/1000))*2*(1+waste/100);
  const pcs=Math.ceil(lm/(bl/1000));
  document.getElementById('clad-res').innerHTML=
    rb(n(gross,2)+' m²','Gross area','mu')+
    rb(n(opA,2)+' m²','Openings','wa')+
    rb(n(net,2)+' m²','Net area','ok')+
    rb(n(dekk)+' mm','Cover width')+
    rb(n(lm,1)+' lm',`Cladding (+${waste}%)`,'inf',true)+
    rb(n(pcs)+' pcs',`Boards (${bl/1000}m)`,'ac');
  const fe=document.getElementById('fix_area');if(fe&&!fe.value)fe.value=net.toFixed(2);
  addSum('cladding','Cladding boards',n(lm,1),'lm',lm*10);save();
}
function calcFix(){
  const area=gv('fix_area'),pm2=gv('fix_type')||15,pack=gv('fix_pack')||200;
  if(!area){document.getElementById('fix-res').innerHTML='';return;}
  const total=Math.ceil(area*pm2*1.05);
  document.getElementById('fix-res').innerHTML=rb(n(total)+' pcs','Total fixings','inf')+rb(n(Math.ceil(total/pack))+' packs',`Packs (${pack})`,'ac');
  addSum('cladding','Cladding fixings',n(total),'pcs',total*0.005);save();
}

// ════ T5: GYPSUM ════
function calcGyp(){
  const area=gv('gyp_area'),pl=gv('gyp_pl')||2400,pw=gv('gyp_pw')||1200;
  const lay=gi('gyp_lay')||1,waste=gv('gyp_waste')||7;
  if(!area){document.getElementById('gyp-res').innerHTML='';return;}
  const plM2=(pl/1000)*(pw/1000);
  const pcs=Math.ceil((area/plM2)*(1+waste/100))*lay;
  document.getElementById('gyp-res').innerHTML=
    rb(n(plM2,3)+' m²','Plate size','mu')+
    rb(n(pcs)+' pcs',`Boards (${lay} layer)`,'inf',true)+
    rb(n(area*lay*(1+waste/100),1)+' m²','Total area','ac')+
    rb(n(pcs*9,0)+' kg','Est. weight','wa');
  const ge=document.getElementById('gs_area');if(ge&&!ge.value)ge.value=area.toFixed(2);
  addSum('gypsum','Gypsum boards',n(pcs),'pcs',pcs*9);save();
}
function setSM(m,btn){studMode=m;document.getElementById('sm-metal').classList.toggle('active',m==='metal');document.getElementById('sm-wood').classList.toggle('active',m==='wood');calcWI();save();}
function calcWI(){
  const area=gv('wi_area'),thick=gi('wi_thick')||98,waste=gv('wi_waste')||5;
  const type=gs('wi_type')||'rock';
  if(!area){document.getElementById('wi-res').innerHTML='';return;}
  const vol=area*(thick/1000)*(1+waste/100);
  document.getElementById('wi-res').innerHTML=
    rb(n(area,2)+' m²','Area','mu')+
    rb(n(vol,3)+' m³','Volume','inf',true)+
    rb(n(vol/0.05,0)+' bags','Loose fill','ac')+
    rb(n(area*(thick/1000)*3.6*1000,0)+' kg','Weight','wa');
  addSum('insulation',`Wall insul ${thick}mm`,n(vol,3),'m³',area*(thick/1000)*3600);save();
}
function calcGS(){
  const area=gv('gs_area'),lay=gi('gs_lay')||1,pack=gv('gs_pack')||500;
  if(!area){document.getElementById('gs-res').innerHTML='';return;}
  const total=Math.ceil(area*20*lay*1.05);
  document.getElementById('gs-res').innerHTML=rb(n(total)+' pcs','Screws','inf')+rb(n(Math.ceil(total/pack))+' packs',`Packs (${pack})`,'ac');
  addSum('gypsum','Gypsum screws',n(total),'pcs',total*0.003);save();
}

// ════ T7: UNIVERSAL ════
function calcCu(){
  const area=gv('cu_area'),w=gv('cu_w'),ol=gv('cu_ol')||0;
  const len=gv('cu_len')||4800,waste=gv('cu_waste')||10;
  const name=gs('cu_name')||'Material';
  if(!area||!w){document.getElementById('cu-res').innerHTML='';return;}
  const cover=(w-ol)/1000;
  const lm=(area/cover)*(1+waste/100);
  const pcs=Math.ceil(lm/(len/1000));
  document.getElementById('cu-res').innerHTML=
    rb(n(w-ol,0)+' mm','Cover width','mu')+
    rb(n(lm,1)+' lm',`${name} lm`,'inf',true)+
    rb(n(pcs)+' pcs',`Pieces (${len/1000}m)`,'ac');
  addSum('custom',name,n(lm,1),'lm',lm*5);save();
}
function calcTiles(){
  const area=gv('tile_area'),tl=gv('tile_l')||300,tw=gv('tile_w')||300,j=gv('tile_j')||3;
  const waste=parseFloat(document.getElementById('tile_diag')?.value)||10;
  if(!area){document.getElementById('tiles-res').innerHTML='';return;}
  const effA=((tl+j)/1000)*((tw+j)/1000);
  const total=Math.ceil((area/effA)*(1+waste/100));
  document.getElementById('tiles-res').innerHTML=
    rb(n(1/effA,1)+'/m²','Tiles/m²','mu')+
    rb(n(total)+' pcs',`Tiles (+${waste}%)`,'inf',true)+
    rb(n(area,2)+' m²','Area','ok');
  addSum('tiles',`Tiles ${tl}×${tw}`,n(total),'pcs',total*((tl/1000)*(tw/1000)*20));save();
}

// ════ T8: SUMMARY ════
function addSum(cat,name,qty,unit,kgEst){sumData[cat+'__'+name]={cat,name,qty,unit,kg:Math.round(kgEst||0)};}
function buildSummary(){
  const tbody=document.getElementById('sum-tbody');
  const rows=Object.values(sumData).filter(r=>{const q=parseFloat(r.qty);return !isNaN(q)&&q>0;});
  if(!rows.length){tbody.innerHTML=`<tr><td colspan="5" style="text-align:center;padding:30px;color:var(--dim);">${d().sum_empty}</td></tr>`;document.getElementById('sum-foot').style.display='none';return;}
  const icons={parquet:'🪵',trims:'📏',terrace:'🏡',cladding:'🏠',gypsum:'📋',insulation:'🌡️',custom:'📐',tiles:'🔲'};
  let totalKg=0,prevCat='';tbody.innerHTML='';
  rows.sort((a,b)=>a.cat.localeCompare(b.cat));
  rows.forEach(r=>{
    if(r.cat!==prevCat){tbody.innerHTML+=`<tr><td colspan="5" style="background:var(--surface2);padding:6px 12px;font-size:0.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;">${icons[r.cat]||'▸'} ${r.cat}</td></tr>`;prevCat=r.cat;}
    totalKg+=r.kg||0;
    tbody.innerHTML+=`<tr><td></td><td class="tl">${r.name}</td><td class="tv">${r.qty}</td><td class="tm">${r.unit}</td><td class="ta">${r.kg>0?n(r.kg,0):'—'}</td></tr>`;
  });
  document.getElementById('sum-kg').textContent=n(totalKg,0)+' kg';
  document.getElementById('sum-t2').textContent=n(totalKg/1000,2)+' t';
  document.getElementById('sum-foot').style.display='block';
}
function buildSvinnTable(){
  const rows=[['Tiles / Fliser','10%','15% diagonal'],['Gypsum / Gipsplater','5–8%','Room shape'],['Parquet / Parketas','10%','15% herringbone'],['Cladding','12–15%','More for vertical'],['Trims / Lister','10%','Corners extra']];
  document.getElementById('svinn-tbody').innerHTML=rows.map(([m,p,no])=>`<tr><td class="tl">${m}</td><td class="tv">${p}</td><td class="tm">${no}</td></tr>`).join('');
}

// ════ SAVE/LOAD ════
function save(){try{const data={lang,rooms,ceils,cwalls,cops,rId,cId,cwId,coId,sumData};document.querySelectorAll('input[id],select[id]').forEach(el=>{data['f_'+el.id]=el.value;});localStorage.setItem(SK,JSON.stringify(data));}catch(e){}}
function load(){try{const raw=localStorage.getItem(SK);if(!raw)return;const data=JSON.parse(raw);lang=data.lang||'en';rooms=data.rooms||[];ceils=data.ceils||[];cwalls=data.cwalls||[];cops=data.cops||[];rId=data.rId||0;cId=data.cId||0;cwId=data.cwId||0;coId=data.coId||0;if(data.sumData)sumData=data.sumData;Object.entries(data).forEach(([k,v])=>{if(!k.startsWith('f_'))return;const el=document.getElementById(k.slice(2));if(el)el.value=v;});}catch(e){}}
function resetAll(){if(!confirm('Reset all data?'))return;localStorage.removeItem(SK);location.reload();}
function calcAll(){calcParquet();calcTrims();calcTer();calcTSC();calcClad();calcFix();calcGyp();calcWI();calcGS();calcCu();calcTiles();}
function updPH(){document.getElementById('ph-t').textContent='ProBuilder — '+gs('proj_name');document.getElementById('ph-m').textContent=gs('proj_addr')+' | '+gs('proj_date');save();}
function exportJSON(){const blob=new Blob([JSON.stringify({sumData,rooms,ceils,cwalls,cops},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='probuilder_materials.json';a.click();}
function importJSON(evt){const file=evt.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=e=>{try{const data=JSON.parse(e.target.result);if(data.rooms)rooms=data.rooms;if(data.sumData)sumData=data.sumData;applyLang();calcAll();}catch{alert('Invalid JSON');}};reader.readAsText(file);}

// ════ INIT ════
window.addEventListener('DOMContentLoaded',()=>{
  load();applyLang();buildSvinnTable();
  if(!document.getElementById('proj_date').value)document.getElementById('proj_date').value=new Date().toISOString().slice(0,10);
  if(rooms.length===0){addRoom('Living room','14000','1','900','2100','2','1200','1200');addRoom('Bedroom','10000','1','800','2100','1','1000','1000');}
  if(ceils.length===0)rooms.forEach((r,i)=>addCeil(r.name||`Room ${i+1}`,r.perim,i));
  if(cwalls.length===0){addCW('North wall',24.5);addCW('East wall',18);}
  calcAll();setTimeout(drawPat,100);updPH();
});
document.addEventListener('input',save);document.addEventListener('change',save);
window.addEventListener('resize',()=>drawPat());
</script>
